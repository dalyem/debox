name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Deploys are owned by Vercel's Git integration:
#   • Production build runs `npx convex deploy --cmd 'npm run build'`
#     (see vercel.json), so Convex prod is deployed on every production build.
#   • Preview builds just `next build` and never touch prod.
# This workflow is the quality gate that runs before any deploy.
jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Dummy, well-formed values so the prerender/compile step succeeds
          # without real secrets (this job never talks to a live backend).
          NEXT_PUBLIC_CONVEX_URL: https://example.convex.cloud
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZGVib3gubG9jYWwk
          CLERK_SECRET_KEY: sk_test_ci0000000000000000000000000000000
          NEXT_PUBLIC_APP_URL: https://debox.example.com
